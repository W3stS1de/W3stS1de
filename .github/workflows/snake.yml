name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Create dist directory
        run: mkdir -p dist
        
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-generated.svg
            
      - name: Debug - Check generated files
        run: |
          echo "Files in dist:"
          ls -la dist/
          echo "Generated file exists:"
          test -f dist/snake-generated.svg && echo "YES" || echo "NO"
          echo "Python script exists:"
          test -f scripts/customize_snake.py && echo "YES" || echo "NO"
          
      - name: Apply custom styles
        run: |
          echo "Applying custom styles..."
          python scripts/customize_snake.py
          
      - name: Debug - Check output files
        run: |
          echo "Files after processing:"
          ls -la snake.svg 2>/dev/null || echo "snake.svg not found"
          echo "First few lines of snake.svg:"
          head -5 snake.svg 2>/dev/null || echo "Cannot read snake.svg"
          
      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
      - name: Commit and push changes
        run: |
          git add snake.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update snake animation with custom styles"
            git push
            echo "Changes pushed to repository"
          fi
